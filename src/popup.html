<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="jike.png" alt="即刻" class="logo">
      <h1>即刻重定向助手</h1>
    </div>

    <!-- 开关 -->
    <div class="section">
      <div class="toggle-row">
        <span class="label">未登录自动跳转手机版</span>
        <label class="switch">
          <input type="checkbox" id="enableToggle" checked>
          <span class="slider"></span>
        </label>
      </div>
      <p class="hint">开启后，访问 web.okjike.com 帖子页面时，若未登录将自动跳转到 m.okjike.com</p>
      <div class="toggle-row" style="margin-top: 12px;">
        <span class="label">已登录自动跳转 Web 版</span>
        <label class="switch">
          <input type="checkbox" id="mobileToWebToggle" checked>
          <span class="slider"></span>
        </label>
      </div>
      <p class="hint">开启后，访问 m.okjike.com 帖子页面时，若已登录 Web 版将自动跳转</p>
      <div class="login-status-row">
        <span class="login-status-label">Web 版登录状态</span>
        <span id="loginStatus" class="login-status-badge">检测中</span>
      </div>
    </div>

    <!-- 当前页快捷操作 -->
    <div class="section" id="currentTabSection" style="display:none;">
      <div class="section-title">当前页面</div>
      <div id="pageInfo" class="page-info" style="display:none;">
        <div class="page-title" id="pageTitle"></div>
        <div class="page-desc" id="pageDesc"></div>
      </div>
      <div class="share-links" id="shareLinks" style="display:none;">
        <div class="share-link-row">
          <span class="share-label">Web 版</span>
          <a id="webLink" href="#" target="_blank" class="share-url"></a>
          <button class="btn-small copy-link-btn" data-target="webLink">复制</button>
        </div>
        <div class="share-link-row">
          <span class="share-label">手机版</span>
          <a id="mobileLink" href="#" target="_blank" class="share-url"></a>
          <button class="btn-small copy-link-btn" data-target="mobileLink">复制</button>
        </div>
      </div>
      <div class="share-actions">
        <button id="currentTabBtn" class="btn" style="display:none;"></button>
        <button id="copyShareBtn" class="btn" style="display:none;">复制分享文案</button>
      </div>
    </div>

    <!-- 链接转换器 -->
    <div class="section">
      <div class="section-title">链接转换</div>
      <input type="text" id="urlInput" class="url-input" placeholder="粘贴即刻链接...">
      <div id="convertResult" class="convert-result" style="display:none;">
        <a id="resultLink" href="#" target="_blank"></a>
        <button id="copyBtn" class="btn-small">复制</button>
      </div>
    </div>
  </div>

  <script src="utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
